<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1e23"/>
      <stop offset="100%" stop-color="#0f1215"/>
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A7AFF"/>
      <stop offset="100%" stop-color="#4DD1C4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A7AFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4DD1C4" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle glow blob behind wolf -->
  <ellipse cx="256" cy="280" rx="180" ry="160" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Wolf head silhouette — geometric/angular Norse style -->
  <g clip-path="url(#round)" filter="url(#softglow)">

    <!-- Ears (pointed, angular) -->
    <polygon points="148,210 172,110 208,195" fill="url(#primary)" opacity="0.9"/>
    <polygon points="364,210 340,110 304,195" fill="url(#primary)" opacity="0.9"/>

    <!-- Inner ear shading -->
    <polygon points="158,200 175,128 202,192" fill="#1a1e23" opacity="0.5"/>
    <polygon points="354,200 337,128 310,192" fill="#1a1e23" opacity="0.5"/>

    <!-- Main head shape -->
    <path d="M 160 210
             Q 148 230 145 260
             Q 142 300 155 330
             Q 170 365 200 380
             Q 228 393 256 394
             Q 284 393 312 380
             Q 342 365 357 330
             Q 370 300 367 260
             Q 364 230 352 210
             Q 330 195 256 192
             Q 182 195 160 210 Z"
          fill="url(#primary)" opacity="0.95"/>

    <!-- Snout -->
    <path d="M 210 320
             Q 210 355 256 368
             Q 302 355 302 320
             Q 290 305 256 300
             Q 222 305 210 320 Z"
          fill="#4A7AFF" opacity="0.7"/>

    <!-- Nose -->
    <ellipse cx="256" cy="336" rx="22" ry="14" fill="#0f1215" opacity="0.9"/>

    <!-- Eyes — glowing -->
    <ellipse cx="212" cy="265" rx="18" ry="16" fill="#0f1215" opacity="0.95"/>
    <ellipse cx="300" cy="265" rx="18" ry="16" fill="#0f1215" opacity="0.95"/>

    <!-- Eye glow -->
    <ellipse cx="212" cy="265" rx="10" ry="9" fill="#4DD1C4" opacity="0.9"/>
    <ellipse cx="300" cy="265" rx="10" ry="9" fill="#4DD1C4" opacity="0.9"/>

    <!-- Eye highlight -->
    <ellipse cx="207" cy="261" rx="4" ry="3.5" fill="white" opacity="0.7"/>
    <ellipse cx="295" cy="261" rx="4" ry="3.5" fill="white" opacity="0.7"/>

    <!-- Mouth line -->
    <path d="M 236 345 Q 256 358 276 345" stroke="#0f1215" stroke-width="3" fill="none" opacity="0.8"/>

    <!-- Cheek fur lines (angular) -->
    <path d="M 155 285 L 188 295" stroke="url(#primary)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M 150 305 L 186 308" stroke="url(#primary)" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <path d="M 357 285 L 324 295" stroke="url(#primary)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M 362 305 L 326 308" stroke="url(#primary)" stroke-width="3" stroke-linecap="round" opacity="0.4"/>

    <!-- Forehead rune mark (ᚠ simplified) -->
    <g opacity="0.7">
      <line x1="256" y1="215" x2="256" y2="250" stroke="#4DD1C4" stroke-width="4" stroke-linecap="round"/>
      <line x1="256" y1="220" x2="272" y2="228" stroke="#4DD1C4" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="256" y1="233" x2="272" y2="241" stroke="#4DD1C4" stroke-width="3.5" stroke-linecap="round"/>
    </g>

  </g>

  <!-- Border ring -->
  <rect width="512" height="512" rx="112" fill="none" stroke="url(#primary)" stroke-width="6" opacity="0.3"/>
</svg>
