<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1e23"/>
      <stop offset="100%" style="stop-color:#22262C"/>
    </linearGradient>
    <linearGradient id="wolf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A7AFF"/>
      <stop offset="100%" style="stop-color:#4DD1C4"/>
